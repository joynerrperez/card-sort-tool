<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Sort</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="name-entry-view">
    <h1>Before you start</h1>
    <label for="participant-id">Your name or ID</label><br>
    <input type="text" id="participant-id" autocomplete="off">
    <button id="start-button">Start Sorting</button>
  </div>

  <div id="sort-view" style="display: none;">
    <h1 id="study-name"></h1>
    <p id="instructions"></p>

    <div class="board">
      <div id="card-pile"></div>
      <div id="category-board" class="board"></div>
    </div>

    <p id="empty-board-hint" style="display: none;">Add at least one category to get started.</p>
    <div id="add-category-form" style="display: none;">
      <input type="text" id="new-category-label" placeholder="New category name" autocomplete="off">
      <button id="add-category-button" type="button">Add Category</button>
    </div>

    <button id="submit-button" disabled>Submit</button>
  </div>

  <div id="complete-view" style="display: none;">
    <h1>Thanks for participating!</h1>
    <p>Your results file has been downloaded. Please send it to the researcher who shared this link with you.</p>
  </div>

  <script src="js/studyConfig.js"></script>
  <script src="js/sortEngine.js"></script>
  <script src="js/exportResults.js"></script>
  <script>
    const HARDCODED_CONFIG = {
      version: 1,
      studyName: "Sample Hybrid Sort",
      mode: "hybrid",
      instructions: "Sort these cards into the categories provided, or add your own if none fit.",
      cards: [
        { id: "c1", label: "Account Settings" },
        { id: "c2", label: "Billing History" },
        { id: "c3", label: "Change Password" },
        { id: "c4", label: "Contact Support" },
        { id: "c5", label: "Download Invoice" },
        { id: "c6", label: "Update Payment Method" }
      ],
      categories: [
        { id: "cat1", label: "Account" },
        { id: "cat2", label: "Billing" }
      ],
      allowParticipantCategories: true
    };

    const elements = {
      studyNameEl: document.getElementById("study-name"),
      instructionsEl: document.getElementById("instructions"),
      pileEl: document.getElementById("card-pile"),
      boardEl: document.getElementById("category-board"),
      submitButtonEl: document.getElementById("submit-button"),
      addCategoryFormEl: document.getElementById("add-category-form"),
      emptyBoardHintEl: document.getElementById("empty-board-hint")
    };

    document.getElementById("add-category-button").addEventListener("click", function () {
      const input = document.getElementById("new-category-label");
      addParticipantCategory(input.value);
      input.value = "";
    });

    let participantId = "";
    let startedAt = null;

    document.getElementById("start-button").addEventListener("click", function () {
      const input = document.getElementById("participant-id").value.trim();
      if (!input) {
        alert("Please enter your name or ID before starting.");
        return;
      }
      participantId = input;
      startedAt = new Date().toISOString();

      document.getElementById("name-entry-view").style.display = "none";
      document.getElementById("sort-view").style.display = "block";

      renderSort(HARDCODED_CONFIG, elements);
    });

    elements.submitButtonEl.addEventListener("click", function () {
      const completedAt = new Date().toISOString();
      const durationSeconds = Math.round((new Date(completedAt) - new Date(startedAt)) / 1000);

      const sortResult = {
        studyName: HARDCODED_CONFIG.studyName,
        mode: HARDCODED_CONFIG.mode,
        participantId: participantId,
        startedAt: startedAt,
        completedAt: completedAt,
        durationSeconds: durationSeconds,
        placements: getPlacements()
      };

      exportSortResult(sortResult);

      document.getElementById("sort-view").style.display = "none";
      document.getElementById("complete-view").style.display = "block";
    });
  </script>
</body>
</html>
